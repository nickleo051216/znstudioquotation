name: Seed Firestore (CHRIS quote)

on:
  workflow_dispatch:
  push:
    branches: [claude/view-quote-content-gLdvF]
    paths:
      - 'scripts/seed-chris-quote.mjs'
      - '.github/workflows/seed-firestore.yml'

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run seed script
        run: node scripts/seed-chris-quote.mjs
